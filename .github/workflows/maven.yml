name: build-war

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: build
        run: mvn clean package

      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: war-file
          path: target/*.war
